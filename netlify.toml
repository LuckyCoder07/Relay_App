[build]
  command = "cd relay-frontend && npm install && npm run build && cd ../backend && npm install --production && cd ../netlify/functions && npm install --production"
  publish = "relay-frontend/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"
  included_files = ["backend/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
